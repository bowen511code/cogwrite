name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python compile (syntax check)
        run: python -m compileall -q .

      - name: Import smoke test
        run: python -c "import app.main; print('import_ok')"

      - name: Check prompt templates exist
        run: |
          test -f prompts/system.j2
          test -f prompts/generate.j2
          echo "prompts_ok"

      - name: Check golden set format
        run: python eval/check_golden_format.py
